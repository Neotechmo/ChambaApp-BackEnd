services:

  postgres:
    image: postgres:16

    container_name: chamba_postgres

    restart: always

    environment:
      POSTGRES_USER: chamba
      POSTGRES_PASSWORD: chamba123
      POSTGRES_DB: chambaapp_db

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: .

    container_name: chamba_backend

    restart: always

    depends_on:
      - postgres

    env_file:
      - .env

    ports:
      - "3000:3000"

volumes:
  postgres_data: